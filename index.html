<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>should we go to the bar and gossip? 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#ffc2d4;overflow-x:hidden;position:relative}
.deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.deco span{position:absolute;opacity:.5;animation:floaty 5s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(var(--r))}50%{transform:translateY(-10px) rotate(var(--r))}}
.page{display:none;min-height:100vh;position:relative;z-index:2}
.page.active{display:flex}
#page1{flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center}
.mice-img{width:220px;border-radius:20px;border:4px solid #fff;box-shadow:0 8px 32px rgba(180,40,100,.25);margin-bottom:1.5rem}
.main-title{font-family:'Pacifico',cursive;font-size:28px;color:#ad1457;line-height:1.4;margin-bottom:2rem;text-shadow:1px 2px 0 rgba(255,255,255,.5)}
.btn-create{font-family:'Pacifico',cursive;font-size:18px;color:#fff;background:linear-gradient(135deg,#e91e8c,#c2185b);border:none;border-radius:50px;padding:16px 36px;cursor:pointer;box-shadow:0 4px 18px rgba(200,30,100,.35);transition:transform .15s}
.btn-create:hover{transform:scale(1.05)}
#page2{flex-direction:row;align-items:stretch}
.p2-left{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.p2-right{width:420px;display:flex;align-items:center;justify-content:center;padding:2rem;flex-shrink:0}
.p2-right img{width:100%;max-width:380px;border-radius:20px;border:4px solid #fff;box-shadow:0 8px 32px rgba(180,40,100,.2)}
.card{background:rgba(255,255,255,.88);border:2px solid #f9a8d4;border-radius:24px;padding:1.75rem;width:100%;max-width:420px}
.card-title{font-family:'Pacifico',cursive;font-size:16px;color:#ad1457;margin-bottom:1.25rem;text-align:center}
.lbl{font-size:13px;color:#ad1457;font-weight:600;margin-bottom:6px;display:block}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.field{margin-bottom:16px}
input[type=date],input[type=time],input[type=text]{width:100%;border:2px solid #f9a8d4;border-radius:12px;padding:10px 13px;font-size:14px;background:#fff0f6;color:#880e4f;outline:none;font-family:inherit}
input:focus{border-color:#e91e8c;background:#fff}
input::placeholder{color:#f48fb1}
.hint{font-size:12px;color:#f48fb1;margin-top:4px}
.btn-send{width:100%;font-family:'Pacifico',cursive;font-size:16px;color:#fff;background:linear-gradient(135deg,#e91e8c,#c2185b);border:none;border-radius:50px;padding:14px;cursor:pointer;box-shadow:0 4px 16px rgba(200,30,100,.3);transition:transform .15s;margin-top:4px}
.btn-send:hover{transform:scale(1.03)}
.btn-send:disabled{opacity:.6;cursor:default;transform:none}
.success-box{display:none;margin-top:1rem;background:#E1F5EE;border:2px solid #9FE1CB;border-radius:14px;padding:16px;text-align:center;font-size:14px;color:#0F6E56}
.success-box strong{font-weight:600;display:block;margin-bottom:4px;font-size:15px}
.btn-back{background:transparent;border:2px solid #f9a8d4;color:#ad1457;border-radius:20px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;margin-top:10px;display:inline-block}
#page3{flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center}
.invite-card{background:rgba(255,255,255,.9);border:2px solid #f9a8d4;border-radius:24px;padding:2rem;max-width:420px;width:100%}
.invite-img{width:140px;border-radius:16px;border:3px solid #fff;box-shadow:0 4px 16px rgba(180,40,100,.2);margin:0 auto 1rem;display:block}
.invite-title{font-family:'Pacifico',cursive;font-size:18px;color:#ad1457;margin-bottom:1rem}
.inv-details{background:#fff0f6;border-radius:14px;padding:14px 16px;margin-bottom:1.25rem;text-align:left}
.inv-details p{font-size:14px;color:#880e4f;line-height:2}
.inv-details strong{font-weight:600}
hr{border:none;border-top:2px dashed #f9a8d4;margin:1.25rem 0}
.rsvp-title{font-size:15px;font-weight:600;color:#880e4f;margin-bottom:.75rem}
.rsvp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.rsvp-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 6px;border-radius:14px;border:2px solid #f9a8d4;background:#fff0f6;cursor:pointer;font-size:12px;color:#ad1457;font-weight:600;transition:all .15s;font-family:inherit}
.rsvp-btn:hover{background:#fce4ec;border-color:#e91e8c;transform:scale(1.04)}
.rsvp-btn .em{font-size:22px}
.rsvp-btn.yes{border-color:#1D9E75;background:#E1F5EE;color:#0F6E56}
.rsvp-btn.maybe{border-color:#BA7517;background:#FAEEDA;color:#854F0B}
.rsvp-btn.no{border-color:#993C1D;background:#FAECE7;color:#712B13}
.rsvp-btn:disabled{opacity:.5;cursor:default;transform:none}
.banner{border-radius:14px;padding:14px 16px;font-size:14px;display:none;margin-top:12px}
.b-yes{background:#E1F5EE;border:1px solid #9FE1CB;color:#0F6E56}
.b-maybe{background:#FAEEDA;border:1px solid #FAC775;color:#854F0B}
.b-no{background:#FAECE7;border:1px solid #F5C4B3;color:#712B13}
.cal-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:#fff;border:1px solid #9FE1CB;border-radius:10px;padding:8px 14px;font-size:13px;color:#0F6E56;text-decoration:none;font-family:inherit;font-weight:500}
.loading{text-align:center;padding:3rem;font-size:14px;color:#ad1457}
@media(max-width:700px){#page2{flex-direction:column}.p2-right{width:100%;padding:0 2rem 2rem}.main-title{font-size:22px}}
</style>
</head>

function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function sbFetch(path, method, body){
  return fetch(SUPABASE_URL+'/rest/v1/'+path, {
    method: method||'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){return r.json();});
}

function createInvite(){
  var d=document.getElementById('inv-d').value;
  var t=document.getElementById('inv-t').value||'20:00';
  var p=document.getElementById('inv-p').value.trim();
  var name=document.getElementById('inv-name').value.trim();
  var tg=document.getElementById('inv-tg').value.trim().replace('@','');
  if(!d||!p){alert('🎀 Введи дату и место!');return;}

  var btn=document.getElementById('btn-send');
  btn.disabled=true;
  btn.textContent='отправляем... ⏳';

  sbFetch('invites', 'POST', {
    date: d,
    time: t,
    place: p,
    friend_name: name||null,
    creator_tg: tg||null,
    creator_chat_id: tg==='nastya_sid0' ? NASTYA_CHAT_ID : null,
    response: null
  }).then(function(data){
    btn.style.display='none';
    document.getElementById('success-box').style.display='block';
  }).catch(function(e){
    console.log(e);
    btn.disabled=false;
    btn.textContent='отправить приглашение 💌';
    alert('Ошибка! Попробуй ещё раз.');
  });
}

function rsvp(id, choice, creatorTg, creatorChatId, place, date, time, friendName){
  ['yes','maybe','no'].forEach(function(x){
    var b=document.getElementById('r-'+x);
    if(b){b.className='rsvp-btn';b.disabled=true;}
  });
  document.getElementById('r-'+choice).classList.add(choice);
  ['b-yes','b-maybe','b-no'].forEach(function(x){document.getElementById(x).style.display='none';});
  document.getElementById('b-'+choice).style.display='block';

  if(choice==='yes' && window._inv){
    var inv=window._inv;
    try{
      var s=new Date(inv.date+'T'+(inv.time||'20:00'));
      var e=new Date(s.getTime()+7200000);
      function fmt(x){return x.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';}
      var ti=encodeURIComponent('🎀 should we go to the bar and gossip — '+inv.place);
      document.getElementById('cal-link').href='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+ti+'&dates='+fmt(s)+'/'+fmt(e)+'&location='+encodeURIComponent(inv.place);
    }catch(e){}
  }

  // save response to supabase
  sbFetch('invites?id=eq.'+id, 'PATCH', {response: choice}).catch(function(e){console.log(e);});

  // send telegram notification
  var emoji=choice==='yes'?'✅':choice==='maybe'?'🤔':'❌';
  var answer=choice==='yes'?'идёт! 🥂':choice==='maybe'?'возможно... 🤞':'не сможет 😢';
  var name=friendName&&friendName!=='null'?friendName:'подружка';
  var msg=emoji+' *'+name+' ответила на приглашение!*

Ответ: *'+answer+'*';
  if(place&&place!=='null') msg+='
📍 '+place;
  if(date&&date!=='null'){
    try{
      var obj=new Date(date+'T'+(time||'20:00'));
      msg+='
📅 '+obj.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'})+' в '+(time||'20:00');
    }catch(e){}
  }

  // known users
  var known={'nastya_sid0': 595540904};
  var tgClean = creatorTg ? creatorTg.toLowerCase().replace('@','') : '';

  function doSend(chatId){
    fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/sendMessage',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:chatId,text:msg,parse_mode:'Markdown'})
    }).catch(function(e){console.log(e);});
  }

  if(!tgClean){ doSend(NASTYA_CHAT_ID); return; }
  if(known[tgClean]){ doSend(known[tgClean]); return; }

  // scan getUpdates
  fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/getUpdates?limit=100')
    .then(function(r){return r.json();})
    .then(function(data){
      var chatId=null;
      if(data.result){
        for(var i=data.result.length-1;i>=0;i--){
          var m=data.result[i].message||data.result[i].edited_message;
          if(m&&m.from&&m.from.username&&m.from.username.toLowerCase()===tgClean){chatId=m.from.id;break;}
        }
      }
      doSend(chatId||NASTYA_CHAT_ID);
    })
    .catch(function(){doSend(NASTYA_CHAT_ID);});
}

// check URL — if ?friend=1 show invite page
