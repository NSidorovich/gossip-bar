<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>should we go to the bar and gossip?</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#ffc2d4;overflow-x:hidden}
.deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.deco span{position:absolute;opacity:.5;animation:floaty 5s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(var(--r))}50%{transform:translateY(-10px) rotate(var(--r))}}
.page{display:none;min-height:100vh;position:relative;z-index:2}
.page.active{display:flex}

/* WHO ARE YOU page */
#page-who{flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center;gap:1.5rem}
.who-title{font-family:'Pacifico',cursive;font-size:24px;color:#ad1457;line-height:1.4}
.who-subtitle{font-size:14px;color:#c2185b;margin-top:-.5rem}
.who-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.who-card{background:rgba(255,255,255,.9);border:3px solid #f9a8d4;border-radius:24px;padding:1.75rem 2rem;cursor:pointer;transition:all .2s;text-align:center;min-width:140px}
.who-card:hover{transform:scale(1.06);border-color:#e91e8c;background:#fff}
.who-card .avatar{font-size:48px;margin-bottom:.5rem}
.who-card .name{font-family:'Pacifico',cursive;font-size:16px;color:#ad1457}

/* MAIN page */
#page-main{flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center;gap:1rem}
.mice-img{width:200px;border-radius:20px;border:4px solid #fff;box-shadow:0 8px 32px rgba(180,40,100,.25);margin-bottom:.5rem}
.main-title{font-family:'Pacifico',cursive;font-size:24px;color:#ad1457;line-height:1.4;margin-bottom:.5rem}
.greeting{font-size:14px;color:#c2185b;margin-bottom:.5rem}
.btn-row{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px}
.btn-main{font-family:'Pacifico',cursive;font-size:16px;color:#fff;border:none;border-radius:50px;padding:15px 24px;cursor:pointer;transition:transform .15s;width:100%}
.btn-invite{background:linear-gradient(135deg,#e91e8c,#c2185b)}
.btn-friend{background:linear-gradient(135deg,#ab47bc,#7b1fa2)}
.btn-main:hover{transform:scale(1.04)}
.btn-switch{background:transparent;border:none;color:#c2185b;font-size:12px;cursor:pointer;font-family:inherit;opacity:.7;margin-top:.5rem}

/* CREATE page */
#page-create{flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;gap:1rem}
.p-left{width:100%;max-width:420px;display:flex;align-items:center;justify-content:center}
.p-right{display:flex;align-items:center;justify-content:center;order:-1}
.p-right img{width:100px;height:100px;object-fit:cover;border-radius:50%;border:4px solid #fff;box-shadow:0 4px 16px rgba(180,40,100,.3)}
.card{background:rgba(255,255,255,.9);border:2px solid #f9a8d4;border-radius:24px;padding:1.75rem;width:100%;max-width:400px}
.card-title{font-family:'Pacifico',cursive;font-size:16px;color:#ad1457;margin-bottom:1.25rem;text-align:center}
.lbl{font-size:13px;color:#ad1457;font-weight:600;margin-bottom:6px;display:block}
.field{margin-bottom:16px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
input[type=date],input[type=time],input[type=text]{width:100%;border:2px solid #f9a8d4;border-radius:12px;padding:10px 13px;font-size:14px;background:#fff0f6;color:#880e4f;outline:none;font-family:inherit}
input:focus{border-color:#e91e8c;background:#fff}
input::placeholder{color:#f48fb1}
.btn-send{width:100%;font-family:'Pacifico',cursive;font-size:15px;color:#fff;background:linear-gradient(135deg,#e91e8c,#c2185b);border:none;border-radius:50px;padding:14px;cursor:pointer;transition:transform .15s;margin-top:4px}
.btn-send:hover{transform:scale(1.03)}
.btn-send:disabled{opacity:.6;cursor:default}
.success-box{display:none;margin-top:1rem;background:#E1F5EE;border:2px solid #9FE1CB;border-radius:14px;padding:16px;text-align:center;font-size:14px;color:#0F6E56}
.btn-back-small{background:transparent;border:none;color:#ad1457;font-size:13px;cursor:pointer;font-family:inherit;margin-top:12px;display:block;width:100%;text-align:center}

/* INVITE page */
#page-invite{flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center}
.invite-card{background:rgba(255,255,255,.9);border:2px solid #f9a8d4;border-radius:24px;padding:2rem;max-width:400px;width:100%}
.invite-img{width:130px;border-radius:16px;border:3px solid #fff;margin:0 auto 1rem;display:block}
.invite-title{font-family:'Pacifico',cursive;font-size:18px;color:#ad1457;margin-bottom:1rem}
.inv-details{background:#fff0f6;border-radius:14px;padding:14px 16px;margin-bottom:1.25rem;text-align:left}
.inv-details p{font-size:14px;color:#880e4f;line-height:2}
.inv-details strong{font-weight:600}
hr{border:none;border-top:2px dashed #f9a8d4;margin:1.25rem 0}
.rsvp-title{font-size:15px;font-weight:600;color:#880e4f;margin-bottom:.75rem}
.rsvp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.rsvp-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 6px;border-radius:14px;border:2px solid #f9a8d4;background:#fff0f6;cursor:pointer;font-size:12px;color:#ad1457;font-weight:600;transition:all .15s;font-family:inherit;width:100%}
.rsvp-btn:hover{background:#fce4ec;border-color:#e91e8c;transform:scale(1.04)}
.rsvp-btn .em{font-size:22px}
.rsvp-btn.yes{border-color:#1D9E75;background:#E1F5EE;color:#0F6E56}
.rsvp-btn.maybe{border-color:#BA7517;background:#FAEEDA;color:#854F0B}
.rsvp-btn.no{border-color:#993C1D;background:#FAECE7;color:#712B13}
.rsvp-btn:disabled{opacity:.5;cursor:default;transform:none}
.banner{border-radius:14px;padding:14px 16px;font-size:14px;display:none;margin-top:12px}
.b-yes{background:#E1F5EE;border:1px solid #9FE1CB;color:#0F6E56}
.b-maybe{background:#FAEEDA;border:1px solid #FAC775;color:#854F0B}
.b-no{background:#FAECE7;border:1px solid #F5C4B3;color:#712B13}
.cal-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:#fff;border:1px solid #9FE1CB;border-radius:10px;padding:8px 14px;font-size:13px;color:#0F6E56;text-decoration:none;font-family:inherit}
.no-invite{text-align:center;padding:2rem;color:#ad1457;font-size:14px}
@media(max-width:700px){#page-create{flex-direction:column}.p-right{width:100%;padding:0 2rem 2rem}.who-cards{flex-direction:column;align-items:center}}
</style>
</head>

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function selectUser(userId){
  localStorage.setItem('gossip_user', userId);
  currentUser=userId;
  updateGreeting();
  showPage('page-main');
}

function switchUser(){
  localStorage.removeItem('gossip_user');
  currentUser=null;
  showPage('page-who');
}

function updateGreeting(){
  var u=USERS[currentUser];
  if(u) document.getElementById('greeting').textContent=u.avatar+' привет, '+u.name+'!';
}

function resetCreate(){
  document.getElementById('btn-send').style.display='block';
  document.getElementById('btn-send').disabled=false;
  document.getElementById('btn-send').textContent='отправить приглашение 💌';
  document.getElementById('success-box').style.display='none';
  document.getElementById('inv-d').value='';
  document.getElementById('inv-p').value='';
}

function sbFetch(path,method,body){
  return fetch(SB_URL+'/rest/v1/'+path,{
    method:method||'GET',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},
    body:body?JSON.stringify(body):undefined
  }).then(function(r){return r.json();});
}

function createInvite(){
  var d=document.getElementById('inv-d').value;
  var t=document.getElementById('inv-t').value||'20:00';
  var p=document.getElementById('inv-p').value.trim();
  if(!d||!p){alert('🎀 Введи дату и место!');return;}
  var u=USERS[currentUser];
  var btn=document.getElementById('btn-send');
  btn.disabled=true;btn.textContent='отправляем... ⏳';
  sbFetch('invites','POST',{
    date:d, time:t, place:p,
    creator_id:currentUser,
    creator_name:u?u.name:'',
    creator_tg:u?u.tg:'',
    creator_chat_id:u?u.chatId:null,
    response:null
  }).then(function(){
    btn.style.display='none';
    document.getElementById('success-box').style.display='block';
  }).catch(function(e){
    btn.disabled=false;btn.textContent='отправить приглашение 💌';
    alert('Ошибка! '+e.message);
  });
}

var INV=null;

      INV=data[0];
      renderInvite(u);

    .catch(function(e){
      console.log(e);
      document.getElementById('invite-content').innerHTML='<div class="no-invite">не удалось загрузить 😢</div>';
    });
}

function doRsvp(choice){
  if(!INV)return;
  ['yes','maybe','no'].forEach(function(x){var b=document.getElementById('r-'+x);if(b){b.className='rsvp-btn';b.disabled=true;}});
  var chosen=document.getElementById('r-'+choice);if(chosen)chosen.classList.add(choice);
  ['b-yes','b-maybe','b-no'].forEach(function(x){var b=document.getElementById(x);if(b)b.style.display='none';});
  var banner=document.getElementById('b-'+choice);if(banner)banner.style.display='block';

  if(choice==='yes'){
    try{
      var s=new Date(INV.date+'T'+(INV.time||'20:00'));
      var e=new Date(s.getTime()+7200000);
      function fmt(x){return x.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';}
      var cl=document.getElementById('cal-link');
      if(cl)cl.href='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent('🎀 bar & gossip — '+INV.place)+'&dates='+fmt(s)+'/'+fmt(e)+'&location='+encodeURIComponent(INV.place);
    }catch(err){}
  }

  sbFetch('invites?id=eq.'+INV.id,'PATCH',{response:choice}).catch(function(e){console.log(e);});

  // notify creator
  var responder=USERS[currentUser];
  var emoji=choice==='yes'?'✅':choice==='maybe'?'🤔':'❌';
  var answer=choice==='yes'?'идёт! 🥂':choice==='maybe'?'возможно... 🤞':'не сможет 😢';
  var rName=responder?responder.name:'подружка';
  var msg=emoji+' *'+rName+' ответила!*\n\nОтвет: *'+answer+'*';
  if(INV.place)msg+='\n📍 '+INV.place;
  if(INV.date){try{var obj=new Date(INV.date+'T'+(INV.time||'20:00'));msg+='\n📅 '+obj.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'})+' в '+(INV.time||'20:00');}catch(e){}}

  function sendTg(chatId){
    fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/sendMessage',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:chatId,text:msg,parse_mode:'Markdown'})
    }).catch(function(e){console.log(e);});
  }

  if(INV.creator_chat_id){sendTg(INV.creator_chat_id);return;}
  if(INV.creator_tg){
    fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/getUpdates?limit=100')
      .then(function(r){return r.json();})
      .then(function(data){
        var chatId=null;
        if(data.result){for(var i=data.result.length-1;i>=0;i--){var m=data.result[i].message;if(m&&m.from&&m.from.username&&m.from.username.toLowerCase()===INV.creator_tg.toLowerCase()){chatId=m.from.id;break;}}}
        if(chatId)sendTg(chatId);
      }).catch(function(){});
  }
}

// on load — check if user already selected
var saved=localStorage.getItem('gossip_user');
if(saved&&USERS[saved]){
  currentUser=saved;
  updateGreeting();
  showPage('page-main');
}
